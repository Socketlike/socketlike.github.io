<!DOCTYPE html>
<html lang="en-US">
  <head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="/favicon.png">
	<link rel="stylesheet" href="/src/style.css">
	<meta name="color-scheme" content="dark">

	<!-- external libraries -->
	<link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/rose-pine.min.css">

	<!-- google font bs -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  </head>

  <body>
	<div id="sidebar" class="translucent-container gap-p75rem">
		<div id="nav">
			<div class="header container">
				<h2 class="muted light meditative compact">nav</h1>
			</div>

			<div id="nav-list" class="rubik bg-content"></div>
		</div>

		<div id="changelog">
			<div class="header container">
				<h2 class="muted light meditative compact">changelog</h1>
			</div>

			<div id="changelog-list" class="rubik gap-4px bg-content"></div>
		</div>
	</div>


	<div id="main" class="container no-container-margin">
		<div id="header" class="container">
			<h1 class="light meditative highlight-me compact">
				<a class="no-default" href="/">evelyn nightshade</a>
			</h1>
		</div>

		<div id="content" class="rubik"></div>

		<div id="footer" class="container rubik vertical-grid gap-4px">
			<div class="muted">
				made with love by <span class="accent">evelyn</span>
			</div>

			<div class="horizontal-min-grid gap-4px">
				<a href="https://github.com/Socketlike/socketlike.github.io">github</a>
			</div>
		</div>
	</div>

	<!-- sorry for the fuckass name!! i can't think of anything better -->
	<div id="rightbar" class="translucent-container gap-p75em">
		<div id="earworm">
			<div class="header container">
				<h2 class="muted light meditative compact">my earworm</h1>
			</div>

			<div id="earworm-details" class="rubik gap-1p25rem bg-content">
				<iframe
					width="100%"
					src="https://www.youtube.com/embed/WhfTaQQzBFI"
					
					title="YouTube video player"
					frameborder="0"
					allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
					referrerpolicy="strict-origin-when-cross-origin"
					allowfullscreen
				></iframe>

				<div id="earworm-lyrics" class="jetbrains-mono gap-8px">
					i think i'm falling and i can't reach you now~<br>
					<span class="mutter">(think i'm falling and i can't reach you now)</span><br>
					i plan to stall it, don't wanna feed the hound~<br>
					<span class="mutter">(hound-hound-h-h-h-hound-hound)</span>
				</div>
			</div>
		</div>
	</div>

	<div id="sidebar-overlay"></div>

	<script type="module" src="/src/index.js"></script>
  </body>
</html>
